<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FTI - Future Teacher Indicator</title>
<style>
body{font-family:Arial,sans-serif;background:#f8f3e9;margin:0;padding:30px;color:#333}
.card{max-width:900px;margin:auto;background:white;padding:30px;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
button{padding:12px 18px;border:none;border-radius:14px;background:#333;color:#fff;cursor:pointer}
.type{border:1px solid #eee;padding:12px;border-radius:12px;margin:10px 0}
</style></head>
<body><div class="card">
<h1>FTI — Future Teacher Indicator</h1>
<p>Which teacher will you become?</p>
<p>（示例版：上传到 GitHub + Vercel 可直接部署）</p>
<button onclick="start()">Start Simulation</button>
<div id="app"></div>
</div>
<script>
const qs=[{q:"Your first lesson is chaotic. What do you do?",a:["Set rules","Use humor","Talk gently"]}];
function start(){document.getElementById('app').innerHTML='<h2>'+qs[0].q+'</h2>'+qs[0].a.map(x=>`<div class=type><button onclick="result('${x}')">${x}</button></div>`).join('')}
function result(x){document.getElementById('app').innerHTML='<h2>Your FTI Result</h2><p>You chose: '+x+'</p><div class=type>🍄 The Mushroom Teacher</div><div class=type>🍎 The Apple Teacher</div><div class=type>⚡ The Lightning Teacher</div>'}
</script></body></html>
